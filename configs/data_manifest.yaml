      definition:
        - TN:2010
        - TN:2011
        - TN:2012
        - ZL:2010
        - ZM:2010
  duplicates:
    default: policy_deferred_review_before_cleanup
    known_duplicate_pairs:
      ohlcv-1m: [6M:2026]
      ohlcv-1s: [6M:2026]
      ohlcv-1h: [6M:2026]
      ohlcv-1d: [6M:2026]
      statistics: [6M:2026, RTY:2017, SR3:2018]
      status: [6M:2026, RTY:2017, SR3:2018]
      definition: [6M:2026]
      trades: [6M:2026]

artifact_policy:
  cleanup_allowed: false
  cleanup_gate: "No cleanup/quarantine until UNKNOWN and policy-deferred paths are reviewed."
  exclusions:
    - path: data/dbn/ohlcv_1m_parent
      classification: DO_NOT_TOUCH
      reason: "Source-like parent DBN folder; redundancy not proven."
    - path: data/dbn/statistics_parent
      classification: DO_NOT_TOUCH
      reason: "Source-like parent DBN folder; redundancy not proven."
    - path: data/dbn/status_parent
      classification: DO_NOT_TOUCH
      reason: "Source-like parent DBN folder; redundancy not proven."
    - path: data/raw/_repair_candidates
      classification: CLEANUP_CANDIDATE_AFTER_APPROVAL
      reason: "Specific raw repair-candidate subtree reviewed as inactive in code/config references; cleanup still requires a dry-run plan and separate approval."
  audit_artifact_prefixes:
    - data/raw/_
  unknown_path_policy: policy_deferred
