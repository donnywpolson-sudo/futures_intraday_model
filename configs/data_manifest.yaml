        - ZN:2012
        - ZS:2011
        - ZS:2013
        - ZT:2010
        - ZT:2011
        - ZT:2012
        - ZT:2013
        - ZT:2014
        - ZW:2013
  extra_pairs:
    default: unexpected_requires_review
    allowed_extra_pairs:
      ohlcv-1m:
        - TN:2010
        - TN:2011
        - TN:2012
        - ZL:2010
        - ZM:2010
      ohlcv-1s:
        - TN:2010
        - TN:2011
        - TN:2012
        - ZL:2010
        - ZM:2010
      statistics:
        - TN:2010
        - TN:2011
        - TN:2012
        - ZL:2010
        - ZM:2010
      status:
        - TN:2010
        - TN:2011
