# Canonical data manifest draft for Phase 1A/1B/1C/2 lineage.
# This file is policy, not cleanup approval. Data mutation stays disabled until
# UNKNOWN and policy-deferred items are reviewed.

version: 1
source_profile: configs/alpha_tiered.yaml::profiles.tier_3_research

canonical_paths:
  dbn_root: data/dbn
  raw_parquet_pattern: data/raw/{market}/{year}.parquet
  causal_parquet_pattern: data/causal_base_candidates/tier1_rebuild_v1/{market}/{year}.parquet

expected_markets:
  - ES
  - NQ
  - RTY
  - YM
  - CL
  - NG
  - RB
  - HO
  - GC
  - SI
  - HG
  - SR3
  - SR1
  - TN
  - ZT
  - ZF
  - ZN
  - ZB
  - UB
  - 6A
  - 6B
  - 6C
  - 6E
  - 6J
  - 6M
  - ZC
  - ZS
  - ZL
  - ZM
  - ZW
  - KE
  - LE
  - HE

expected_years:
  default_start_year: 2010
  end_year: 2026
  market_start_year_overrides:
    KE: 2013
    RTY: 2017
    SR1: 2018
    SR3: 2018
    TN: 2016
    ZL: 2011
    ZM: 2011

schemas:
  dbn:
    - name: ohlcv-1m
      path_name: ohlcv_1m
    - name: ohlcv-1s
      aliases: [1s]
      path_name: ohlcv_1s
    - name: ohlcv-1h
      aliases: [1h]
      path_name: ohlcv_1h
    - name: ohlcv-1d
      aliases: [1d]
      path_name: ohlcv_1d
    - name: statistics
      path_name: statistics
    - name: status
      path_name: status
    - name: definition
      path_name: definition
  trades:
    name: trades
    path_name: trades
    expected_years: [2025, 2026]
    observed_coverage_note: "Current lineage inventory shows 2025-06-18 through 2026-06-13 style DBN chunks."

coverage_policy:
  missing_pairs:
    default: unexpected_requires_review
    allowed_missing_pairs:
      data/dbn/status:
        # Approved status DBN optional-enrichment deferral. Phase 1B treats
        # status as optional enrichment; Phase 1C/2 restart smoke does not
        # require these status DBN pairs for raw/causal path validation.
        - 6A:2014
        - 6B:2014
        - 6C:2010
        - 6C:2011
        - 6C:2014
        - 6E:2012
        - 6E:2013
        - 6E:2014
        - 6J:2010
        - 6J:2014
        - 6M:2013
        - 6M:2014
        - ES:2014
        - GC:2010
        - GC:2014
        - HE:2013
        - HG:2011
        - HG:2014
        - HO:2010
        - HO:2011
        - HO:2012
        - HO:2013
        - KE:2013
        - KE:2014
        - LE:2010
        - LE:2011
        - LE:2012
        - LE:2013
        - NQ:2012
        - NQ:2014
        - RB:2010
        - RB:2011
        - RB:2012
        - RB:2013
        - RB:2014
        - SI:2014
        - UB:2010
        - UB:2011
        - UB:2012
        - YM:2011
        - YM:2012
        - YM:2013
        - YM:2014
        - ZB:2010
        - ZB:2011
        - ZB:2012
        - ZC:2010
        - ZC:2014
        - ZF:2010
        - ZF:2011
        - ZF:2012
        - ZL:2012
        - ZL:2013
        - ZM:2011
