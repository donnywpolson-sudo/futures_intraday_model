profiles:
  tier_0:
    description: "Tier 0 smoke: ES, 2024."
    intent: smoke_test
    requirement_set: production_like
    settings_profile: smoke
    markets: ["ES"]
    years: [2024]
    forbid_research_use: true

  metadata_optional_test:
    description: "Unit-test-only relaxed raw schema."
    intent: unit_test_only
    requirement_set: test_only
    settings_profile: smoke
    markets: ["ES"]
    years: [2024]
    forbid_research_use: true

  tier_1_research:
    description: "Core Research: core family-diverse markets, 2023-2024."
    intent: core_recent_research
    requirement_set: production_like
    settings_profile: recent_research
    markets: *core_markets
    years: *research_years
    market_families: *core_market_families

  tier_1_holdout:
    description: "Locked Holdout: core markets, 2025."
    intent: core_final_holdout
    requirement_set: production_like
    settings_profile: recent_research
    markets: *core_markets
    years: *final_holdout_years
    forbid_research_use: true
    market_families: *core_market_families

  tier_1_forward:
    description: "Forward: core markets, 2026 current/partial year."
    intent: core_forward_validation
    requirement_set: production_like
    settings_profile: recent_research
    markets: *core_markets
    years: *forward_years
    forbid_research_use: true
    market_families: *core_market_families

  tier_2_research:
    description: "Robustness Research: 15 balanced markets, 2018-2024."
    intent: balanced_medium_research
    requirement_set: production_like
    settings_profile: long_research
    markets: *balanced_markets
    years: *balanced_research_years
    market_families: *balanced_market_families

  tier_2_holdout:
    description: "Locked Holdout: 15 balanced markets, 2025."
    intent: balanced_final_holdout
    requirement_set: production_like
    settings_profile: long_research
    markets: *balanced_markets
