default_profile: tier_1

# Alpha testing ladder:
# - tier_0: Smoke, never alpha evidence.
# - tier_1: Core Research, fastest real alpha iteration.
# - tier_2: Robustness Research, broader market/regime check.
# - tier_3: Stress Research, full-universe long-history stress.
# - *_holdout: Locked Holdout, 2025 only, no tuning or model selection.
# - *_forward: Forward, 2026 current/partial year, no tuning or model selection.

paths:
  raw_root: data/raw
  causal_base_root: null
  labeled_root: data/labeled
  feature_matrix_root: null
  predictions_root: null
  executions_root: data/executions
  frozen_features_root: data/frozen_features
  reports_root: reports

