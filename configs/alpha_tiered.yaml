causal_base:
  # Databento OHLCV bars are trade-derived and no bar is printed for a no-trade
  # interval. For sparse short-rate products, Phase 2 preserves this convention
  # instead of fabricating flat synthetic price bars. Their roll exclusion window
  # is elapsed minutes, not observed trade bars, because sparse bars can span
  # much longer than one minute between adjacent rows.
  sparse_trade_derived_ohlcv_markets: ["SR1", "SR3"]
  sparse_trade_derived_roll_window_minutes: 15
  # For configured markets, missing in-session Databento OHLCV-1m minutes are
  # handled as vendor-backed no-trade intervals after DBN coverage, raw/DBN
  # alignment, timestamp ordering, OHLC, volume, tick-grid, and session/calendar
  # checks pass. Synthetic row pct and max gap remain diagnostic evidence, but
  # Phase 2 does not require local L1 self-proof for every no-bar minute.
  vendor_trusted_ohlcv_no_trade_markets: *full_markets

